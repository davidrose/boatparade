                    const rh = h * scale;

                    const canvasRect = imgCanvas.getBoundingClientRect();
                    const gLineTop = document.getElementById('global-line-top');
                    const gLineBottom = document.getElementById('global-line-bottom');
                    if (gLineTop) {
                        gLineTop.style.display = 'block';
                        gLineTop.style.top = (canvasRect.top + ry) + 'px';
                    }
                    if (gLineBottom) {
                        gLineBottom.style.display = 'block';
                        gLineBottom.style.top = (canvasRect.top + ry + rh) + 'px';
                    }

                    oCtx.strokeStyle = '#fff';
                    oCtx.lineWidth = 1; // 1px cuboid as requested

                    // Draw Cuboid
                    const headingRadCube = THREE.MathUtils.degToRad(matchHeading);
                    const zScale = 0.3;
                    const perspectiveTiltY = rh * 0.15; // additional offset to look down on it
                    const backOffsetX = -Math.sin(headingRadCube) * (rw * zScale);
                    const backOffsetY = (-Math.cos(headingRadCube) * (rh * zScale)) - perspectiveTiltY;

                    oCtx.fillStyle = 'rgba(255, 255, 255, 0.05)'; // subtle glass fill

                    // Back Face
                    oCtx.fillRect(rx + backOffsetX, ry + backOffsetY, rw, rh);
                    oCtx.strokeRect(rx + backOffsetX, ry + backOffsetY, rw, rh);

                    // Front Face
                    oCtx.fillRect(rx, ry, rw, rh);
                    oCtx.strokeRect(rx, ry, rw, rh);

                    // Connecting lines (cuboid corners)
                    oCtx.beginPath();
                    oCtx.moveTo(rx, ry); oCtx.lineTo(rx + backOffsetX, ry + backOffsetY);
                    oCtx.moveTo(rx + rw, ry); oCtx.lineTo(rx + rw + backOffsetX, ry + backOffsetY);
                    oCtx.moveTo(rx, ry + rh); oCtx.lineTo(rx + backOffsetX, ry + rh + backOffsetY);
                    oCtx.moveTo(rx + rw, ry + rh); oCtx.lineTo(rx + rw + backOffsetX, ry + rh + backOffsetY);
                    oCtx.stroke();


                    const hLine = document.getElementById('global-horizon-line');
                    if (hLine) {
                        hLine.style.display = 'block';
                        const rightRect = document.getElementById('canvas-container').getBoundingClientRect();
                        hLine.style.top = (rightRect.top + rightRect.height / 2) + 'px';
                    }

                    // --- Labels ---
                    const labelPx2D = document.getElementById('label-px-2d');
                    const labelSize2D = document.getElementById('label-size-2d');

                    const labelPx3D = document.getElementById('label-px-3d');
                    const labelSize3D = document.getElementById('label-size-3d');

                    const labelDist = document.getElementById('label-dist');

                    const rulerLine2D = document.getElementById('dist-ruler-line-2d');
                    const rulerLine3D = document.getElementById('dist-ruler-line-3d');

                    const boxCenterX = canvasRect.left + rx + rw / 2;
                    const absBoxTop = canvasRect.top + ry;
                    const absBoxBottom = canvasRect.top + ry + rh;
                    const screenBottom = window.innerHeight;
                    const screenCenterX = window.innerWidth / 2;

                    labelPx2D.style.display = 'block';
                    labelSize2D.style.display = 'block';
                    rulerLine2D.style.display = 'block';

                    labelDist.style.display = 'block';

                    const pixelLabelText = `Pixel Size: ${Math.round(w)} px`;
                    const sizeLabelText = `Est. Size: ${Math.round(currentBoatLength * 3.28)} ft`;

                    labelPx2D.textContent = pixelLabelText;
                    labelPx2D.style.left = boxCenterX + 'px';
                    labelPx2D.style.top = (absBoxTop - 44) + 'px';

                    labelSize2D.innerHTML = sizeLabelText;
                    labelSize2D.style.left = boxCenterX + 'px';
                    labelSize2D.style.top = (absBoxTop - 16) + 'px';

                    const distFt = estimatedDistance ? Math.round(estimatedDistance * 3.28084) : '--';
                    labelDist.innerHTML = `&uarr;&darr; ${distFt} ft`;

                    // Ruler line from center bottom to 2D boat
                    const diffX2D = boxCenterX - screenCenterX;
                    const diffY2D = absBoxBottom - screenBottom;
                    const len2D = Math.sqrt(diffX2D * diffX2D + diffY2D * diffY2D);
                    const angle2D = Math.atan2(diffY2D, diffX2D);

                    rulerLine2D.style.width = len2D + 'px';
                    rulerLine2D.style.height = '1px';
                    rulerLine2D.style.borderLeft = 'none';
                    rulerLine2D.style.borderTop = '2px dashed rgba(255, 255, 255, 0.4)';
                    rulerLine2D.style.transformOrigin = '0 0';
                    rulerLine2D.style.transform = `rotate(${angle2D}rad)`;
                    rulerLine2D.style.left = screenCenterX + 'px';
                    rulerLine2D.style.top = screenBottom + 'px';

                    // Place Distance label near origin
                    labelDist.style.left = screenCenterX + 'px';
                    labelDist.style.top = (screenBottom - 40) + 'px';

                    // 3D Boat Duplicate Labels
                    if (!isOverlayMode && currentModelMesh) {
                        labelPx3D.style.display = 'block';
                        labelSize3D.style.display = 'block';
                        rulerLine3D.style.display = 'block';

                        // Calculate right side container bounds to find center
                        const rightRect = document.getElementById('canvas-container').getBoundingClientRect();
                        const rightCenterX = rightRect.left + (rightRect.width / 2);
                        // Horizon is exactly middle of 3D right pane
                        const horizonY = rightRect.top + rightRect.height / 2;

                        // Approximate the visual bounding box height of the 3D model
                        // We use the pixel width calculated roughly by boxPixelWidth tracking
                        const fake3DWidth = boxPixelWidth;
                        const fake3DHeight = currentBBox ? (currentBBox[3] * (fake3DWidth / currentBBox[2])) : fake3DWidth;

                        // We want the box to start at horizon and go down (since y=0 is horizon target)
                        const abs3DBoxTop = horizonY - (fake3DHeight / 4); // rough approximation
                        const abs3DBoxBottom = horizonY + fake3DHeight - (fake3DHeight / 4);

                        labelPx3D.textContent = pixelLabelText;
                        labelPx3D.style.left = rightCenterX + 'px';
                        labelPx3D.style.top = (abs3DBoxTop - 44) + 'px';

                        labelSize3D.innerHTML = sizeLabelText;
                        labelSize3D.style.left = rightCenterX + 'px';
                        labelSize3D.style.top = (abs3DBoxTop - 16) + 'px';

                        // Ruler line from center bottom to 3D boat
                        const diffX3D = rightCenterX - screenCenterX;
                        const diffY3D = abs3DBoxBottom - screenBottom;
                        const len3D = Math.sqrt(diffX3D * diffX3D + diffY3D * diffY3D);
                        const angle3D = Math.atan2(diffY3D, diffX3D);

                        rulerLine3D.style.width = len3D + 'px';
                        rulerLine3D.style.height = '1px';
                        rulerLine3D.style.borderLeft = 'none';
                        rulerLine3D.style.borderTop = '2px dashed rgba(255, 255, 255, 0.4)';
                        rulerLine3D.style.transformOrigin = '0 0';
                        rulerLine3D.style.transform = `rotate(${angle3D}rad)`;
                        rulerLine3D.style.left = screenCenterX + 'px';
                        rulerLine3D.style.top = screenBottom + 'px';

                    } else {
                        labelPx3D.style.display = 'none';
                        labelSize3D.style.display = 'none';
                        rulerLine3D.style.display = 'none';
                    }
                }
            }
        }

        // ── Drag Interactivity for HTML Labels ──
        let dragMode = null; // 'size', 'size3d', or 'dist'
        let dragStartVal = 0;
        let dragStartY = 0;
        let dragStartX = 0;

        document.getElementById('label-size-2d').addEventListener('mousedown', (e) => {
            dragMode = 'size';
            dragStartX = e.clientX;
            dragStartVal = currentBoatLength;
            e.preventDefault();
        });

        document.getElementById('label-size-3d').addEventListener('mousedown', (e) => {
            dragMode = 'size';
            dragStartX = e.clientX;
            dragStartVal = currentBoatLength;
            e.preventDefault();
        });

        document.getElementById('label-dist').addEventListener('mousedown', (e) => {
            dragMode = 'dist';
            dragStartY = e.clientY;
            dragStartVal = estimatedDistance;
            e.preventDefault();
        });

        window.addEventListener('mousemove', (e) => {
            if (dragMode === 'size') {
                const delta = e.clientX - dragStartX;
                currentBoatLength = Math.max(1, dragStartVal + delta * 0.1);

                // Keep the 3D model internally consistent by simulating a new model length selection
                const prevScale = VESSEL_SCALES[currentBoatName] || 1;
                // Since loadFleet standardizes to 1m, and currentModelMesh starts at 1x = 1m
                currentModelMesh.scale.setScalar(currentBoatLength);

                // Update text fields
                document.getElementById('out-len').textContent = Math.round(currentBoatLength * 3.28084) + ' ft';

                // We must artificially adjust the estimated distance because resizing the physical model
                // means it must be closer/further to maintain the same pixel footprint
                calculateDistance(false);
                drawOverlay([{ bbox: currentBBox, class: 'boat', score: 1 }]);

                // Keep UI synced for user confidence
                resetConfirmState();
            } else if (dragMode === 'dist') {
                const delta = e.clientY - dragStartY;
                // Inverse relation visually: dragging UP (negative delta) means further away (higher dist)
                estimatedDistance = Math.max(1, dragStartVal - delta * 0.5);

                // When forcing distance interactively, we must update the zoom to break the 1-to-1 sync
                calculateDistance(true); // pass flag to indicate forced distance
                drawOverlay([{ bbox: currentBBox, class: 'boat', score: 1 }]);
                resetConfirmState();
            }
        });

        window.addEventListener('mouseup', () => { dragMode = null; });

        async function processImageWithAI() {
            if (!cocoModel) {
                showStatus('Model still loading, please wait...', 3000);
                return;
            }

            showStatus('Detecting boats...');
            document.getElementById('out-dist').textContent = 'Analyzing...';
            document.getElementById('out-dist').className = 'val pending';

            try {
                // COCO-SSD can run on a canvas element directly
                const allPredictions = await cocoModel.detect(imgCanvas);

                // Filter to boat-related classes
                const boatClasses = ['boat', 'ship'];
                let predictions = allPredictions.filter(p => boatClasses.includes(p.class));

                // If no boat found, try to use the largest detection as fallback
                if (predictions.length === 0 && allPredictions.length > 0) {
                    // Sort by area descending and take the largest
                    allPredictions.sort((a, b) => (b.bbox[2] * b.bbox[3]) - (a.bbox[2] * a.bbox[3]));
                    predictions = [allPredictions[0]];
                    showStatus(`No boat class found. Using largest detection: "${predictions[0].class}"`, 4000);
                }

                if (predictions.length === 0) {
                    showStatus('No objects detected. Try a different image.', 4000);
                    return;
                }

                // Pick the largest boat by bounding box area
                predictions.sort((a, b) => (b.bbox[2] * b.bbox[3]) - (a.bbox[2] * a.bbox[3]));
                const best = predictions[0];

                // COCO-SSD already returns bbox as [x, y, width, height] in image pixels
                const formattedPredictions = [{
                    bbox: best.bbox,
                    class: best.class,
                    score: best.score
                }];

                console.log('COCO-SSD Prediction:', formattedPredictions);
                drawOverlay(formattedPredictions);

                currentBBox = best.bbox;
                autoSelectModel(best.bbox[2], best.bbox[3]);

                // Redraw one final time after setting currentBBox so zoom handles correctly
                drawOverlay(formattedPredictions);
                align3DBoatToLines();

                document.getElementById('btn-confirm').style.display = 'block';
                showStatus(`Detected: ${best.class} (${(best.score * 100).toFixed(0)}% confidence)`, 4000);

            } catch (err) {
                console.error('Detection Error:', err);
                showStatus('Failed to detect boat.', 4000);
            }
        }

        // ── Distance Math ──
        // Flag prevents overriding interactively dragged distance
        function calculateDistance(forcedDistance = false) {
            if (!currentBBox || rawImageWidth === 0 || currentBoatLength === 0 || !currentModelMesh) {
                document.getElementById('out-dist').textContent = 'Awaiting Detection...';
                document.getElementById('out-dist').className = 'val pending';
                return;
            }

            const hfovRad = THREE.MathUtils.degToRad(cameraHFOV);
            const focalLengthPx = (rawImageWidth / 2) / Math.tan(hfovRad / 2);
            globalFocalLengthPx = focalLengthPx;

            const box3 = new THREE.Box3().setFromObject(currentModelMesh);
            const size3D = new THREE.Vector3();
            box3.getSize(size3D);
            const H_3D = size3D.y;

            if (!forcedDistance) {
                const bboxHeightPx = currentBBox[3];
                estimatedDistance = H_3D * (focalLengthPx / bboxHeightPx);
            }

            const estDistFt = estimatedDistance * 3.28084;
            const outEl = document.getElementById('out-dist');
            outEl.textContent = Math.round(estDistFt) + ' ft';
            outEl.className = 'val';

            align3DBoatToLines(forcedDistance);
        }

        // Accurately lock the 3D camera
        function align3DBoatToLines(forcedDistance = false) {
            if (!currentBBox || !currentModelMesh || !imageElement.src || isOverlayMode) return;

            // ... same scaling math for visual 2D match ...
            const cw = dropZone.clientWidth;
            const ch = dropZone.clientHeight;
            const imgAspect = imageElement.naturalWidth / imageElement.naturalHeight;
            const containerAspect = cw / ch;

            let renderW, renderH;
            if (imgAspect > containerAspect) {
                renderW = cw;
                renderH = cw / imgAspect;
            } else {
                renderH = ch;
                renderW = ch * imgAspect;
            }
            const scale = renderW / imageElement.naturalWidth;
            const rh = currentBBox[3] * scale; // Bounding box pixel height on screen

            // 3D Canvas
            const rightPaneHeight = document.getElementById('right-panel').clientHeight;

            // 3D Object Height
            const box3 = new THREE.Box3().setFromObject(currentModelMesh);
            const size3D = new THREE.Vector3();
            box3.getSize(size3D);
            const H_3D = size3D.y;

            // VFOV of the camera
            const hfovRad = THREE.MathUtils.degToRad(cameraHFOV);
            const vfovRad = 2 * Math.atan(Math.tan(hfovRad / 2) / camera.aspect);

            // Compute distance needed to render object at exactly `rh` pixels tall on the right screen
            const visualDistance = H_3D * rightPaneHeight / (2 * rh * Math.tan(vfovRad / 2));

            // Compute Y pan offset to align object with horizontal lines
            const canvasRect = imgCanvas.getBoundingClientRect();
            const rightRect = document.getElementById('canvas-container').getBoundingClientRect();

            const boxCenterY = canvasRect.top + (currentBBox[1] * scale) + (rh / 2);
            const rightCenterY = rightRect.top + rightPaneHeight / 2;

            // Pixel offset downwards
            const screenOffsetY = rightCenterY - boxCenterY;

            // Convert to world shift
            const worldShift = screenOffsetY * (H_3D / rh);

            // Set Camera (keep heading angle, but apply exact distance and pan)
            const headingRad = THREE.MathUtils.degToRad(matchHeading);

            // Assume look target is centered on the boat geometry
            controls.target.set(0, (H_3D / 2) + worldShift, 0);

            // Fix X and Z based on heading (orbit around the target)
            camera.position.set(0, (H_3D / 2) + worldShift, visualDistance);
            controls.update();
        }

        // ── Animation Loop ──
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const dt = clock.getDelta();
            if (water && water.material.uniforms['time']) {
                water.material.uniforms['time'].value += dt;
            }
            controls.update();
            renderer.render(scene, camera);

            // --- Palette Scene (Scissor Rendering) ---
            if (paletteRenderer && paletteItemsData.length > 0) {
                const pCanvas = paletteRenderer.domElement;
                // Keep the canvas pixel size in sync with its CSS size (no DPR)
                const cssW = pCanvas.clientWidth;
                const cssH = pCanvas.clientHeight;
                if (pCanvas.width !== cssW || pCanvas.height !== cssH) {
                    paletteRenderer.setSize(cssW, cssH, false);
                }

                paletteRenderer.setScissorTest(false);
                paletteRenderer.setClearColor(0x000000, 0);
                paletteRenderer.clear();
                paletteRenderer.setScissorTest(true);

                const cr = pCanvas.getBoundingClientRect();
                const time = performance.now() * 0.001;

                paletteItemsData.forEach(item => {
                    if (!item.mesh || !item.scene) return;

                    // Spin gently
                    item.mesh.rotation.y = time * 0.15;

                    const rect = item.element.getBoundingClientRect();

                    // Skip if element is not within the canvas bounds at all
                    if (rect.right <= cr.left || rect.left >= cr.right ||
                        rect.bottom <= cr.top || rect.top >= cr.bottom) return;

                    // Compute viewport/scissor in CSS pixels relative to canvas origin
                    const vX = Math.round(rect.left - cr.left);
                    const vW = Math.round(rect.width);
                    const vH = Math.round(rect.height);
                    // WebGL scissor Y is from bottom of canvas
                    const vY = Math.round(cr.bottom - rect.bottom);

                    paletteCamera.aspect = vW / vH;
                    paletteCamera.updateProjectionMatrix();

                    paletteRenderer.setViewport(vX, vY, vW, vH);
                    paletteRenderer.setScissor(vX, vY, vW, vH);
                    paletteRenderer.render(item.scene, paletteCamera);
                });

                paletteRenderer.setScissorTest(false);
            }
        }

        initPalette();
        animate();

        // Start
        loadFleet();

    </script>
