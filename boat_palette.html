<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOKOUT — Boat Reference Palette</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #e5e5e5;
            min-height: 100vh;
        }

        #header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(26, 26, 26, 0.9);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-left h1 {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .header-left .subtitle {
            font-size: 12px;
            color: #888;
        }

        .badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            background: #2a2a2a;
            border: 1px solid #333;
            color: #888;
        }

        #column-headers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 800px;
            margin: 12px auto 0;
            padding: 0 16px;
        }

        .col-header {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 0;
            border-radius: 6px;
            color: #999;
            background: #222;
            border: 1px solid #333;
        }

        #palette-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 800px;
            margin: 8px auto 32px;
            padding: 0 16px;
        }

        .boat-card {
            position: relative;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .boat-card:hover {
            border-color: #555;
        }

        .card-num {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 9px;
            font-weight: 600;
            background: rgba(0, 0, 0, 0.5);
            color: #aaa;
            border: 1px solid #444;
            z-index: 5;
        }

        .card-3d {
            width: 100%;
            height: 120px;
            position: relative;
        }

        .card-3d canvas {
            width: 100% !important;
            height: 100% !important;
            outline: none;
        }

        .card-info {
            padding: 6px 10px;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-info .name {
            font-size: 12px;
            font-weight: 600;
            color: #ccc;
        }

        .card-info .size {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #888;
            background: #2a2a2a;
            padding: 2px 6px;
            border-radius: 4px;
        }

        .boat-card.placeholder {
            visibility: hidden;
        }
    </style>
</head>

<body>

    <div id="header">
        <div class="header-left">
            <h1>LOOKOUT</h1>
            <span class="subtitle">Boat Reference</span>
        </div>
        <span class="badge" id="count-badge">Loading...</span>
    </div>

    <div id="column-headers">
        <div class="col-header">Motorboats</div>
        <div class="col-header">Sailboats</div>
    </div>

    <div id="palette-grid"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const BOATS = [
            { name: 'Jet Ski 10', file: 'AIS_JetSkis-A_001.glb', meters: 3, type: 'motor' },
            { name: 'Sailboat 15', file: 'AIS_Sailboat-Small-A_001.glb', meters: 4.6, type: 'sail' },
            { name: 'Powerboat 20', file: 'AIS_Powerboat-A_001.glb', meters: 6.1, type: 'motor' },
            { name: 'Sailboat 25', file: 'AIS_Sailboat-Medium-A_001.glb', meters: 7.6, type: 'sail' },
            { name: 'Center Console 30', file: 'AIS-BOAT_CenterConsole_A_001.glb', meters: 9.14, type: 'motor' },
            { name: 'Sailboat 40', file: 'AIS_Sailboat-Large-A_001.glb', meters: 12.2, type: 'sail' },
            { name: 'Center Console 45', file: 'AIS-BOAT_CenterConsole_B_001.glb', meters: 13.7, type: 'motor' },
            { name: 'Yacht 60', file: 'AIS_Yacht-A_001.glb', meters: 18.3, type: 'motor' },
            { name: 'Super Sail 90', file: 'AIS_Sailboat-SuperSail-A_001.glb', meters: 27.4, type: 'sail' },
        ];

        BOATS.sort((a, b) => a.meters - b.meters);

        const motorBoats = BOATS.filter(b => b.type === 'motor');
        const sailBoats = BOATS.filter(b => b.type === 'sail');
        const maxRows = Math.max(motorBoats.length, sailBoats.length);
        const rows = [];
        for (let i = 0; i < maxRows; i++) {
            rows.push({ motor: motorBoats[i] || null, sail: sailBoats[i] || null });
        }

        const grid = document.getElementById('palette-grid');
        const cardData = [];
        const loader = new GLTFLoader();
        let globalNum = 0;

        rows.forEach(row => {
            createCard(row.motor, 'motor');
            createCard(row.sail, 'sail');
        });

        document.getElementById('count-badge').textContent = `${BOATS.length} vessels under 100 ft`;

        function createCard(boat, type) {
            const card = document.createElement('div');
            card.className = `boat-card ${type}`;

            if (!boat) {
                card.classList.add('placeholder');
                card.innerHTML = '<div style="height:152px"></div>';
                grid.appendChild(card);
                return;
            }

            globalNum++;

            card.innerHTML = `
                <div class="card-num">${globalNum}</div>
                <div class="card-3d"></div>
                <div class="card-info">
                    <span class="name">${boat.name}</span>
                </div>
            `;
            grid.appendChild(card);

            const container = card.querySelector('.card-3d');
            const scene = new THREE.Scene();
            scene.background = null;

            const camera = new THREE.PerspectiveCamera(35, container.clientWidth / container.clientHeight, 0.1, 500);
            camera.position.set(2, 1.2, 2.5);
            camera.lookAt(0, 0.2, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.0;
            container.appendChild(renderer.domElement);

            // Lighting - simple gray
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const dir = new THREE.DirectionalLight(0xffffff, 1.5);
            dir.position.set(5, 8, 6);
            scene.add(dir);
            const fill = new THREE.DirectionalLight(0xcccccc, 0.3);
            fill.position.set(-4, 3, -4);
            scene.add(fill);

            // Plate
            const plate = new THREE.Mesh(
                new THREE.CylinderGeometry(1.0, 1.0, 0.03, 32),
                new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.6, metalness: 0.2 })
            );
            plate.position.y = -0.02;
            scene.add(plate);

            // Ring
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(1.0, 0.015, 8, 48),
                new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.5 })
            );
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.01;
            scene.add(ring);

            const modelGroup = new THREE.Group();
            scene.add(modelGroup);

            // Proportional scaling: sqrt compression so small boats are still visible
            // Largest boat (Super Sail 27.4m) → targetSize 1.8
            // Smallest (Jet Ski 3m) → sqrt(3/27.4) * 1.8 = ~0.60 (still clearly visible)
            const maxMeters = 27.4; // Super Sail
            const maxTarget = 1.8;
            const proportionalTarget = Math.sqrt(boat.meters / maxMeters) * maxTarget;
            // Floor: never smaller than 0.55 so jet ski & kayak are always visible
            const targetSize = Math.max(proportionalTarget, 0.55);

            loader.load(`models/${boat.file}`, (gltf) => {
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const size = new THREE.Vector3();
                box.getSize(size);
                const sf = targetSize / Math.max(size.x, size.y, size.z);
                model.scale.setScalar(sf);

                box.setFromObject(model);
                const center = new THREE.Vector3();
                box.getCenter(center);
                model.position.x -= center.x;
                model.position.z -= center.z;
                model.position.y -= box.min.y;

                const mat = new THREE.MeshPhysicalMaterial({
                    color: 0xd0d0d0, roughness: 0.35, metalness: 0.05, clearcoat: 0.2
                });

                model.traverse(child => {
                    if (child.isMesh) {
                        child.material = mat;
                        const n = (child.name || '').toLowerCase();
                        if (n.includes('plane') || n.includes('floor') || n.includes('shadow') || n.includes('water') || n.includes('wake')) child.visible = false;
                        if (child.geometry) {
                            if (child.geometry.type === 'PlaneGeometry') { child.visible = false; }
                            else {
                                if (!child.geometry.boundingBox) child.geometry.computeBoundingBox();
                                if (child.geometry.boundingBox && (child.geometry.boundingBox.max.y - child.geometry.boundingBox.min.y) < 0.1) child.visible = false;
                            }
                        }
                    }
                });

                // White forward arrow (scaled proportionally too)
                const arrowLen = targetSize * 0.3;
                const arrow = new THREE.ArrowHelper(new THREE.Vector3(0, 0, 1), new THREE.Vector3(0, 0.08, 0), arrowLen, 0xffffff, arrowLen * 0.2, arrowLen * 0.12);
                model.add(arrow);

                modelGroup.add(model);
            }, undefined, (err) => {
                console.warn(`Failed to load ${boat.file}:`, err);
            });

            cardData.push({ container, renderer, scene, camera, modelGroup });
        }

        // Animation
        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();
            cardData.forEach(e => {
                e.modelGroup.rotation.y = t * 0.4;
                const r = e.container.getBoundingClientRect();
                if (r.bottom > 0 && r.top < window.innerHeight) {
                    e.renderer.render(e.scene, e.camera);
                }
            });
        }
        animate();

        window.addEventListener('resize', () => {
            cardData.forEach(e => {
                const w = e.container.clientWidth, h = e.container.clientHeight;
                e.camera.aspect = w / h;
                e.camera.updateProjectionMatrix();
                e.renderer.setSize(w, h);
            });
        });
    </script>
</body>

</html>
