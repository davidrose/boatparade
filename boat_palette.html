<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOKOUT — Boat Reference Palette</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #e5e5e5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #column-headers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 800px;
            margin: 12px auto 0;
            padding: 0 16px;
            transition: opacity 0.4s, transform 0.4s;
        }

        .col-header {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 0;
            border-radius: 6px;
            color: #999;
            background: #222;
            border: 1px solid #333;
        }

        #palette-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 800px;
            margin: 8px auto 32px;
            padding: 0 16px;
        }

        /* ── Card ── */
        .boat-card {
            position: relative;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .boat-card:hover {
            border-color: #6aa;
            transform: translateY(-3px);
            box-shadow: 0 6px 24px rgba(80, 180, 200, 0.15);
            background: #282828;
        }

        .boat-card.faded {
            opacity: 0;
            transform: scale(0.85);
            pointer-events: none;
        }

        .boat-card.expanded {
            position: fixed;
            top: 50%;
            left: 50%;
            width: min(420px, 90vw);
            height: min(480px, 80vh);
            z-index: 200;
            border: none;
            background: transparent;
            box-shadow: none;
            cursor: default;
            animation: expandIn 0.35s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes expandIn {
            0% {
                opacity: 0.7;
                transform: translate(-50%, -50%) scale(0.6);
            }

            100% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        .boat-card.expanded:hover {
            transform: translate(-50%, -50%);
            box-shadow: none;
            border: none;
            background: transparent;
        }

        .boat-card.expanded .card-3d {
            height: 100%;
        }

        .boat-card.expanded .card-num {
            display: none;
        }

        .boat-card.expanded .card-info {
            display: none;
        }

        /* Backdrop */
        #backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.85);
            z-index: 150;
            cursor: pointer;
        }

        #backdrop.active {
            display: block;
        }

        /* Number — no circle, no background */
        .card-num {
            position: absolute;
            top: 5px;
            left: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 16px;
            font-weight: 700;
            color: rgba(255, 255, 255, 0.5);
            z-index: 5;
            cursor: pointer;
            transition: all 0.2s ease;
            text-shadow: 0 1px 4px rgba(0, 0, 0, 0.6);
        }

        .card-num:hover {
            color: rgba(100, 200, 255, 0.9);
            transform: scale(1.2);
            text-shadow: 0 0 8px rgba(100, 200, 255, 0.4);
        }

        .card-3d {
            width: 100%;
            height: 140px;
            position: relative;
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-3d canvas {
            width: 100% !important;
            height: 100% !important;
            outline: none;
            pointer-events: none;
        }

        .boat-card.expanded .card-3d canvas {
            pointer-events: auto;
        }

        .card-info {
            padding: 6px 10px;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-info .name {
            font-size: 12px;
            font-weight: 600;
            color: #ccc;
        }

        .boat-card.expanded .card-info .name {
            font-size: 14px;
        }

        .boat-card.placeholder {
            visibility: hidden;
        }

        /* Back button */
        .back-btn {
            display: none;
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 5px 12px;
            border: 1px solid #555;
            background: rgba(30, 30, 30, 0.9);
            color: #ccc;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            z-index: 10;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #333;
            color: #fff;
            border-color: #888;
        }

        .boat-card.expanded .back-btn {
            display: block;
        }

        /* Heading label */
        .heading-label {
            display: none;
            position: absolute;
            bottom: 42px;
            right: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #666;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 3px;
            z-index: 10;
        }

        .boat-card.expanded .heading-label {
            display: block;
        }

        .headers-hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="backdrop"></div>

    <div id="column-headers">
        <div class="col-header">Motorboats</div>
        <div class="col-header">Sailboats</div>
    </div>

    <div id="palette-grid"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const BOATS = [
            { name: 'Jet Ski 10', file: 'AIS_JetSkis-A_001.glb', meters: 3, type: 'motor' },
            { name: 'Sailboat 15', file: 'AIS_Sailboat-Small-A_001.glb', meters: 4.6, type: 'sail' },
            { name: 'Powerboat 20', file: 'AIS_Powerboat-A_001.glb', meters: 6.1, type: 'motor' },
            { name: 'Sailboat 25', file: 'AIS_Sailboat-Medium-A_001.glb', meters: 7.6, type: 'sail' },
            { name: 'Center Console 30', file: 'AIS-BOAT_CenterConsole_A_001.glb', meters: 9.14, type: 'motor' },
            { name: 'Sailboat 40', file: 'AIS_Sailboat-Large-A_001.glb', meters: 12.2, type: 'sail' },
            { name: 'Center Console 45', file: 'AIS-BOAT_CenterConsole_B_001.glb', meters: 13.7, type: 'motor' },
            { name: 'Yacht 60', file: 'AIS_Yacht-A_001.glb', meters: 18.3, type: 'motor' },
            { name: 'Super Sail 90', file: 'AIS_Sailboat-SuperSail-A_001.glb', meters: 27.4, type: 'sail' },
        ];

        BOATS.sort((a, b) => a.meters - b.meters);

        const motorBoats = BOATS.filter(b => b.type === 'motor');
        const sailBoats = BOATS.filter(b => b.type === 'sail');
        motorBoats.forEach((b, i) => { b.num = i + 1; });
        sailBoats.forEach((b, i) => { b.num = motorBoats.length + i + 1; });

        const maxRows = Math.max(motorBoats.length, sailBoats.length);
        const rows = [];
        for (let i = 0; i < maxRows; i++) {
            rows.push({ motor: motorBoats[i] || null, sail: sailBoats[i] || null });
        }

        const grid = document.getElementById('palette-grid');
        const backdrop = document.getElementById('backdrop');
        const colHeaders = document.getElementById('column-headers');
        const cardEntries = [];
        const loader = new GLTFLoader();

        let expandedEntry = null;

        rows.forEach(row => {
            createCard(row.motor, 'motor');
            createCard(row.sail, 'sail');
        });

        function createCard(boat, type) {
            const card = document.createElement('div');
            card.className = `boat-card ${type}`;

            if (!boat) {
                card.classList.add('placeholder');
                card.innerHTML = '<div style="height:172px"></div>';
                grid.appendChild(card);
                return;
            }

            card.innerHTML = `
                <div class="card-num">${boat.num}</div>
                <button class="back-btn">✕ Close</button>
                <span class="heading-label">0°</span>
                <div class="card-3d"></div>
                <div class="card-info">
                    <span class="name">${boat.name}</span>
                </div>
            `;
            grid.appendChild(card);

            const container = card.querySelector('.card-3d');
            const scene = new THREE.Scene();
            scene.background = null;

            const camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 500);
            camera.position.set(1.8, 1.0, 2.2);
            camera.lookAt(0, 0.15, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.3;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const keyLight = new THREE.DirectionalLight(0xfff0e0, 2.2);
            keyLight.position.set(3, 6, 4);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.set(512, 512);
            keyLight.shadow.camera.near = 0.1;
            keyLight.shadow.camera.far = 20;
            keyLight.shadow.camera.left = -3;
            keyLight.shadow.camera.right = 3;
            keyLight.shadow.camera.top = 3;
            keyLight.shadow.camera.bottom = -3;
            keyLight.shadow.radius = 4;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0x7090b0, 0.5);
            fillLight.position.set(-3, 2, -2);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xffd4a0, 0.3);
            rimLight.position.set(0, 1, -4);
            scene.add(rimLight);

            // Water plate — very dark blue
            const waterNormalTex = new THREE.TextureLoader().load(
                'https://threejs.org/examples/textures/waternormals.jpg',
                (tex) => { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(3, 3); }
            );
            const plateMat = new THREE.MeshStandardMaterial({
                color: 0x0a1628, roughness: 0.7, metalness: 0.1,
                normalMap: waterNormalTex, normalScale: new THREE.Vector2(0.25, 0.25),
            });
            const plate = new THREE.Mesh(
                new THREE.CylinderGeometry(1.3, 1.3, 0.02, 48), plateMat
            );
            plate.position.y = -0.01;
            plate.receiveShadow = true;
            scene.add(plate);

            // Ring
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(1.3, 0.01, 8, 64),
                new THREE.MeshBasicMaterial({ color: 0x334455, transparent: true, opacity: 0.4 })
            );
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.005;
            scene.add(ring);

            const modelGroup = new THREE.Group();
            scene.add(modelGroup);

            // Proportional scaling
            const maxMeters = 27.4;
            const maxTarget = 2.6;
            const proportionalTarget = Math.sqrt(boat.meters / maxMeters) * maxTarget;
            const targetSize = Math.max(proportionalTarget, 0.8);

            // Heading arrow (initially hidden)
            const arrowGroup = new THREE.Group();
            arrowGroup.visible = false;
            modelGroup.add(arrowGroup);

            // No OrbitControls at init — created on expand only
            let controls = null;

            loader.load(`models/${boat.file}`, (gltf) => {
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const size = new THREE.Vector3();
                box.getSize(size);
                const sf = targetSize / Math.max(size.x, size.y, size.z);
                model.scale.setScalar(sf);

                box.setFromObject(model);
                const center = new THREE.Vector3();
                box.getCenter(center);
                model.position.x -= center.x;
                model.position.z -= center.z;
                model.position.y -= box.min.y;

                const mat = new THREE.MeshPhysicalMaterial({
                    color: 0x8898a8, roughness: 0.45, metalness: 0.15, clearcoat: 0.1,
                    transparent: true, opacity: 0.82,
                });

                model.traverse(child => {
                    if (child.isMesh) {
                        child.material = mat;
                        child.castShadow = true;
                        child.receiveShadow = true;
                        const n = (child.name || '').toLowerCase();
                        if (n.includes('plane') || n.includes('floor') || n.includes('shadow') || n.includes('water') || n.includes('wake')) child.visible = false;
                        if (child.geometry) {
                            if (child.geometry.type === 'PlaneGeometry') child.visible = false;
                            else {
                                if (!child.geometry.boundingBox) child.geometry.computeBoundingBox();
                                if (child.geometry.boundingBox && (child.geometry.boundingBox.max.y - child.geometry.boundingBox.min.y) < 0.1) child.visible = false;
                            }
                        }
                    }
                });

                modelGroup.add(model);

                // Bounding box wireframe
                const visibleBox = new THREE.Box3();
                model.traverse(child => {
                    if (child.isMesh && child.visible) {
                        child.geometry.computeBoundingBox();
                        const meshBox = child.geometry.boundingBox.clone();
                        meshBox.applyMatrix4(child.matrixWorld);
                        visibleBox.union(meshBox);
                    }
                });
                const invMatrix = new THREE.Matrix4().copy(model.matrixWorld).invert();
                visibleBox.applyMatrix4(invMatrix);
                const bSize = new THREE.Vector3();
                const bCenter = new THREE.Vector3();
                visibleBox.getSize(bSize);
                visibleBox.getCenter(bCenter);
                const boxEdges = new THREE.EdgesGeometry(new THREE.BoxGeometry(bSize.x, bSize.y, bSize.z));
                const boxLine = new THREE.LineSegments(boxEdges,
                    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 })
                );
                boxLine.position.copy(bCenter);
                model.add(boxLine);
                entry.boxLine = boxLine;

                // Heading arrow — white, smaller, pointing along +Z (front of boat)
                const arrowLen = 0.8;
                const arrowMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const shaft = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.015, 0.015, arrowLen, 8), arrowMat
                );
                shaft.rotation.x = Math.PI / 2;
                shaft.position.z = arrowLen / 2;
                arrowGroup.add(shaft);

                const cone = new THREE.Mesh(
                    new THREE.ConeGeometry(0.05, 0.15, 8), arrowMat
                );
                cone.rotation.x = Math.PI / 2;
                cone.position.z = arrowLen + 0.06;
                arrowGroup.add(cone);

                box.setFromObject(model);
                const mc = new THREE.Vector3();
                box.getCenter(mc);
                arrowGroup.position.set(0, mc.y * 0.3, 0);

                // Heading sprite — large text rendered in 3D above the boat
                const headCanvas = document.createElement('canvas');
                headCanvas.width = 256;
                headCanvas.height = 128;
                const headCtx = headCanvas.getContext('2d');
                const headTex = new THREE.CanvasTexture(headCanvas);
                const headSprite = new THREE.Sprite(
                    new THREE.SpriteMaterial({ map: headTex, transparent: true, depthTest: false })
                );
                headSprite.scale.set(2.0, 1.0, 1);
                headSprite.position.set(0, 1.5, 0);
                headSprite.visible = false;
                modelGroup.add(headSprite);
                entry.headSprite = headSprite;
                entry.headCtx = headCtx;
                entry.headTex = headTex;
                entry.headCanvas = headCanvas;
            });

            const entry = {
                container, renderer, scene, camera, modelGroup, boat, card,
                plateMat, plate, ring, arrowGroup,
                getControls: () => controls,
                setControls: (c) => { controls = c; },
            };

            // Click card to expand
            card.addEventListener('click', (e) => {
                if (e.target.closest('.back-btn')) return;
                if (expandedEntry === entry) return;
                expandCard(entry);
            });

            // Back button
            card.querySelector('.back-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                collapseCard();
            });

            cardEntries.push(entry);
        }

        // ── Expand / Collapse ──
        function expandCard(entry) {
            expandedEntry = entry;

            cardEntries.forEach(e => {
                if (e !== entry) e.card.classList.add('faded');
            });
            colHeaders.classList.add('headers-hidden');
            entry.card.classList.add('expanded');
            backdrop.classList.add('active');

            // Show heading arrow, show heading sprite (keep bounding box visible)
            entry.arrowGroup.visible = true;
            if (entry.headSprite) entry.headSprite.visible = true;

            // Hide disc plate/ring, add water grid plane
            if (entry.plate) entry.plate.visible = false;
            if (entry.ring) entry.ring.visible = false;

            // Create 10m x 10m water grid surface
            const waterGridTex = new THREE.TextureLoader().load(
                'https://threejs.org/examples/textures/waternormals.jpg',
                (tex) => { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(6, 6); }
            );
            const gridPlane = new THREE.Mesh(
                new THREE.PlaneGeometry(5, 5),
                new THREE.MeshStandardMaterial({
                    color: 0x0a1628, roughness: 0.6, metalness: 0.1,
                    normalMap: waterGridTex, normalScale: new THREE.Vector2(0.2, 0.2),
                })
            );
            gridPlane.rotation.x = -Math.PI / 2;
            gridPlane.position.y = 0;
            gridPlane.receiveShadow = true;
            entry.scene.add(gridPlane);
            entry._gridPlane = gridPlane;

            // Grid lines (10m = 10 divisions)
            const gridHelper = new THREE.GridHelper(5, 10, 0x1a3050, 0x122040);
            gridHelper.position.y = 0.005;
            entry.scene.add(gridHelper);
            entry._gridHelper = gridHelper;

            // Create OrbitControls — horizontal rotation only
            const ctrl = new OrbitControls(entry.camera, entry.renderer.domElement);
            ctrl.enableDamping = true;
            ctrl.dampingFactor = 0.08;
            ctrl.enablePan = false;
            ctrl.minDistance = 1.5;
            ctrl.maxDistance = 6;
            ctrl.target.set(0, 0.3, 0);
            // Lock vertical: fix the polar angle so you can only rotate horizontally
            const currentPolar = ctrl.getPolarAngle();
            ctrl.minPolarAngle = currentPolar;
            ctrl.maxPolarAngle = currentPolar;
            entry.setControls(ctrl);

            // Resize after transition
            setTimeout(() => resizeEntry(entry), 50);
            setTimeout(() => resizeEntry(entry), 550);
        }

        function collapseCard() {
            if (!expandedEntry) return;
            const entry = expandedEntry;

            // Hide arrow, hide heading sprite
            entry.arrowGroup.visible = false;
            if (entry.headSprite) entry.headSprite.visible = false;

            // Remove water grid, restore disc
            if (entry._gridPlane) { entry.scene.remove(entry._gridPlane); entry._gridPlane = null; }
            if (entry._gridHelper) { entry.scene.remove(entry._gridHelper); entry._gridHelper = null; }
            if (entry.plate) entry.plate.visible = true;
            if (entry.ring) entry.ring.visible = true;

            // Destroy orbit controls
            const ctrl = entry.getControls();
            if (ctrl) {
                ctrl.dispose();
                entry.setControls(null);
            }

            // Reset camera
            entry.camera.position.set(1.8, 1.0, 2.2);
            entry.camera.lookAt(0, 0.15, 0);

            entry.card.classList.remove('expanded');
            backdrop.classList.remove('active');
            cardEntries.forEach(e => e.card.classList.remove('faded'));
            colHeaders.classList.remove('headers-hidden');

            expandedEntry = null;
            setTimeout(() => resizeEntry(entry), 550);
        }

        function resizeEntry(entry) {
            const w = entry.container.clientWidth;
            const h = entry.container.clientHeight;
            if (w > 0 && h > 0) {
                entry.camera.aspect = w / h;
                entry.camera.updateProjectionMatrix();
                entry.renderer.setSize(w, h);
            }
        }

        backdrop.addEventListener('click', collapseCard);
        window.addEventListener('keydown', (e) => { if (e.key === 'Escape') collapseCard(); });

        // ── Animation Loop ──
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            cardEntries.forEach((e, i) => {
                if (e !== expandedEntry) {
                    e.modelGroup.rotation.y = t * 0.5;
                }

                // Wave bobbing
                e.modelGroup.position.y = Math.sin(t * 1.5 + i * 0.7) * 0.02;
                e.modelGroup.rotation.x = Math.sin(t * 1.2 + i * 0.5) * 0.015;
                e.modelGroup.rotation.z = Math.cos(t * 1.0 + i * 0.9) * 0.01;

                // Animate water
                if (e.plateMat.normalMap) {
                    e.plateMat.normalMap.offset.x = t * 0.02;
                    e.plateMat.normalMap.offset.y = t * 0.015;
                }

                // Update orbit controls if expanded
                const ctrl = e.getControls();
                if (ctrl) {
                    ctrl.update();

                    // Compute heading: 0° = boat front (+Z) aimed at camera
                    if (e.headCtx && e.headTex) {
                        const camPos = new THREE.Vector3();
                        e.camera.getWorldPosition(camPos);
                        camPos.sub(ctrl.target);
                        const camAzimuth = Math.atan2(camPos.x, camPos.z);
                        const boatAzimuth = e.modelGroup.rotation.y;
                        let heading = THREE.MathUtils.radToDeg(boatAzimuth - camAzimuth);
                        heading = ((heading % 360) + 360) % 360;

                        const ctx = e.headCtx;
                        ctx.clearRect(0, 0, 256, 128);
                        ctx.font = 'bold 72px Inter, sans-serif';
                        ctx.textAlign = 'center';
                        ctx.textBaseline = 'middle';
                        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
                        ctx.fillText(Math.round(heading) + '°', 128, 64);
                        e.headTex.needsUpdate = true;
                    }
                }

                // Render if visible
                const r = e.container.getBoundingClientRect();
                if (r.bottom > 0 && r.top < window.innerHeight && r.width > 0) {
                    e.renderer.render(e.scene, e.camera);
                }
            });
        }
        animate();

        window.addEventListener('resize', () => {
            cardEntries.forEach(e => resizeEntry(e));
        });
    </script>
</body>

</html>
