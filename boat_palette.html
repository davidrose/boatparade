<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOOKOUT — Boat Reference Palette</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #1a1a1a;
            color: #e5e5e5;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #column-headers {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 800px;
            margin: 12px auto 0;
            padding: 0 16px;
            transition: opacity 0.4s, transform 0.4s;
        }

        .col-header {
            text-align: center;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            padding: 6px 0;
            border-radius: 6px;
            color: #999;
            background: #222;
            border: 1px solid #333;
        }

        #palette-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            max-width: 800px;
            margin: 8px auto 32px;
            padding: 0 16px;
        }

        /* ── Card ── */
        .boat-card {
            position: relative;
            background: #222;
            border: 1px solid #333;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .boat-card:hover {
            border-color: #555;
            transform: translateY(-2px);
        }

        .boat-card.faded {
            opacity: 0;
            transform: scale(0.85);
            pointer-events: none;
        }

        .boat-card.expanded {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: min(420px, 90vw);
            height: min(480px, 80vh);
            z-index: 200;
            border-color: #555;
            box-shadow: 0 0 80px rgba(0, 0, 0, 0.8);
        }

        .boat-card.expanded .card-3d {
            height: calc(100% - 36px);
        }

        .boat-card.expanded .card-num {
            display: none;
        }

        /* Backdrop when expanded */
        #backdrop {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(10, 10, 10, 0.85);
            z-index: 150;
            cursor: pointer;
        }

        #backdrop.active {
            display: block;
        }

        .card-num {
            position: absolute;
            top: 6px;
            left: 6px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.6);
            color: #ccc;
            border: 1px solid #555;
            z-index: 5;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .card-num:hover {
            background: rgba(59, 130, 246, 0.3);
            border-color: #3b82f6;
            color: #fff;
            transform: scale(1.15);
        }

        .card-3d {
            width: 100%;
            height: 140px;
            position: relative;
            transition: height 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card-3d canvas {
            width: 100% !important;
            height: 100% !important;
            outline: none;
        }

        .card-info {
            padding: 6px 10px;
            border-top: 1px solid #333;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-info .name {
            font-size: 12px;
            font-weight: 600;
            color: #ccc;
        }

        .boat-card.expanded .card-info .name {
            font-size: 14px;
        }

        .boat-card.placeholder {
            visibility: hidden;
        }

        /* Back button shown on expanded card */
        .back-btn {
            display: none;
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 5px 12px;
            border: 1px solid #555;
            background: rgba(30, 30, 30, 0.9);
            color: #ccc;
            border-radius: 5px;
            font-size: 11px;
            cursor: pointer;
            z-index: 10;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
        }

        .back-btn:hover {
            background: #333;
            color: #fff;
            border-color: #888;
        }

        .boat-card.expanded .back-btn {
            display: block;
        }

        /* Heading label */
        .heading-label {
            display: none;
            position: absolute;
            bottom: 42px;
            right: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            color: #666;
            background: rgba(0, 0, 0, 0.4);
            padding: 2px 6px;
            border-radius: 3px;
            z-index: 10;
        }

        .boat-card.expanded .heading-label {
            display: block;
        }

        /* Column headers fade when expanded */
        .headers-hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>

<body>

    <div id="backdrop"></div>

    <div id="column-headers">
        <div class="col-header">Motorboats</div>
        <div class="col-header">Sailboats</div>
    </div>

    <div id="palette-grid"></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        const BOATS = [
            { name: 'Jet Ski 10', file: 'AIS_JetSkis-A_001.glb', meters: 3, type: 'motor' },
            { name: 'Sailboat 15', file: 'AIS_Sailboat-Small-A_001.glb', meters: 4.6, type: 'sail' },
            { name: 'Powerboat 20', file: 'AIS_Powerboat-A_001.glb', meters: 6.1, type: 'motor' },
            { name: 'Sailboat 25', file: 'AIS_Sailboat-Medium-A_001.glb', meters: 7.6, type: 'sail' },
            { name: 'Center Console 30', file: 'AIS-BOAT_CenterConsole_A_001.glb', meters: 9.14, type: 'motor' },
            { name: 'Sailboat 40', file: 'AIS_Sailboat-Large-A_001.glb', meters: 12.2, type: 'sail' },
            { name: 'Center Console 45', file: 'AIS-BOAT_CenterConsole_B_001.glb', meters: 13.7, type: 'motor' },
            { name: 'Yacht 60', file: 'AIS_Yacht-A_001.glb', meters: 18.3, type: 'motor' },
            { name: 'Super Sail 90', file: 'AIS_Sailboat-SuperSail-A_001.glb', meters: 27.4, type: 'sail' },
        ];

        BOATS.sort((a, b) => a.meters - b.meters);

        const motorBoats = BOATS.filter(b => b.type === 'motor');
        const sailBoats = BOATS.filter(b => b.type === 'sail');
        motorBoats.forEach((b, i) => { b.num = i + 1; });
        sailBoats.forEach((b, i) => { b.num = motorBoats.length + i + 1; });

        const maxRows = Math.max(motorBoats.length, sailBoats.length);
        const rows = [];
        for (let i = 0; i < maxRows; i++) {
            rows.push({ motor: motorBoats[i] || null, sail: sailBoats[i] || null });
        }

        const grid = document.getElementById('palette-grid');
        const backdrop = document.getElementById('backdrop');
        const colHeaders = document.getElementById('column-headers');
        const cardEntries = []; // all card data
        const loader = new GLTFLoader();

        let expandedEntry = null; // currently expanded

        rows.forEach(row => {
            createCard(row.motor, 'motor');
            createCard(row.sail, 'sail');
        });

        function createCard(boat, type) {
            const card = document.createElement('div');
            card.className = `boat-card ${type}`;

            if (!boat) {
                card.classList.add('placeholder');
                card.innerHTML = '<div style="height:172px"></div>';
                grid.appendChild(card);
                return;
            }

            card.innerHTML = `
                <div class="card-num">${boat.num}</div>
                <button class="back-btn">✕ Close</button>
                <span class="heading-label">0°</span>
                <div class="card-3d"></div>
                <div class="card-info">
                    <span class="name">${boat.name}</span>
                </div>
            `;
            grid.appendChild(card);

            const container = card.querySelector('.card-3d');
            const scene = new THREE.Scene();
            scene.background = null;

            const camera = new THREE.PerspectiveCamera(30, container.clientWidth / container.clientHeight, 0.1, 500);
            camera.position.set(1.8, 1.0, 2.2);
            camera.lookAt(0, 0.15, 0);

            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.3;
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
            keyLight.position.set(3, 6, 4);
            keyLight.castShadow = true;
            keyLight.shadow.mapSize.set(512, 512);
            keyLight.shadow.camera.near = 0.1;
            keyLight.shadow.camera.far = 20;
            keyLight.shadow.camera.left = -3;
            keyLight.shadow.camera.right = 3;
            keyLight.shadow.camera.top = 3;
            keyLight.shadow.camera.bottom = -3;
            keyLight.shadow.radius = 4;
            scene.add(keyLight);

            const fillLight = new THREE.DirectionalLight(0x9bb8d4, 0.6);
            fillLight.position.set(-3, 2, -2);
            scene.add(fillLight);

            const rimLight = new THREE.DirectionalLight(0xffd4a0, 0.4);
            rimLight.position.set(0, 1, -4);
            scene.add(rimLight);

            // Water plate
            const waterNormalTex = new THREE.TextureLoader().load(
                'https://threejs.org/examples/textures/waternormals.jpg',
                (tex) => { tex.wrapS = tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(3, 3); }
            );
            const plateMat = new THREE.MeshStandardMaterial({
                color: 0x4a8a9a, roughness: 0.75, metalness: 0.05,
                normalMap: waterNormalTex, normalScale: new THREE.Vector2(0.2, 0.2),
            });
            const plate = new THREE.Mesh(
                new THREE.CylinderGeometry(1.3, 1.3, 0.02, 48), plateMat
            );
            plate.position.y = -0.01;
            plate.receiveShadow = true;
            scene.add(plate);

            // Ring
            const ring = new THREE.Mesh(
                new THREE.TorusGeometry(1.3, 0.01, 8, 64),
                new THREE.MeshBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.4 })
            );
            ring.rotation.x = -Math.PI / 2;
            ring.position.y = 0.005;
            scene.add(ring);

            const modelGroup = new THREE.Group();
            scene.add(modelGroup);

            // Proportional scaling
            const maxMeters = 27.4;
            const maxTarget = 2.6;
            const proportionalTarget = Math.sqrt(boat.meters / maxMeters) * maxTarget;
            const targetSize = Math.max(proportionalTarget, 0.8);

            // Heading arrow (initially hidden, shown when expanded)
            const arrowGroup = new THREE.Group();
            arrowGroup.visible = false;
            modelGroup.add(arrowGroup);

            // OrbitControls (disabled until expanded)
            const controls = new OrbitControls(camera, renderer.domElement);
            controls.enabled = false;
            controls.enableDamping = true;
            controls.dampingFactor = 0.08;
            controls.enablePan = false;
            controls.minDistance = 1;
            controls.maxDistance = 8;
            controls.target.set(0, 0.3, 0);

            let loadedModel = null;

            loader.load(`models/${boat.file}`, (gltf) => {
                const model = gltf.scene;
                const box = new THREE.Box3().setFromObject(model);
                const size = new THREE.Vector3();
                box.getSize(size);
                const sf = targetSize / Math.max(size.x, size.y, size.z);
                model.scale.setScalar(sf);

                box.setFromObject(model);
                const center = new THREE.Vector3();
                box.getCenter(center);
                model.position.x -= center.x;
                model.position.z -= center.z;
                model.position.y -= box.min.y;

                const mat = new THREE.MeshPhysicalMaterial({
                    color: 0xa8b0b8, roughness: 0.45, metalness: 0.15, clearcoat: 0.15,
                    transparent: true, opacity: 0.92,
                });

                model.traverse(child => {
                    if (child.isMesh) {
                        child.material = mat;
                        child.castShadow = true;
                        child.receiveShadow = true;
                        const n = (child.name || '').toLowerCase();
                        if (n.includes('plane') || n.includes('floor') || n.includes('shadow') || n.includes('water') || n.includes('wake')) child.visible = false;
                        if (child.geometry) {
                            if (child.geometry.type === 'PlaneGeometry') child.visible = false;
                            else {
                                if (!child.geometry.boundingBox) child.geometry.computeBoundingBox();
                                if (child.geometry.boundingBox && (child.geometry.boundingBox.max.y - child.geometry.boundingBox.min.y) < 0.1) child.visible = false;
                            }
                        }
                    }
                });

                modelGroup.add(model);
                loadedModel = model;

                // Bounding box wireframe — parented to model
                const visibleBox = new THREE.Box3();
                model.traverse(child => {
                    if (child.isMesh && child.visible) {
                        child.geometry.computeBoundingBox();
                        const meshBox = child.geometry.boundingBox.clone();
                        meshBox.applyMatrix4(child.matrixWorld);
                        visibleBox.union(meshBox);
                    }
                });
                const invMatrix = new THREE.Matrix4().copy(model.matrixWorld).invert();
                visibleBox.applyMatrix4(invMatrix);
                const bSize = new THREE.Vector3();
                const bCenter = new THREE.Vector3();
                visibleBox.getSize(bSize);
                visibleBox.getCenter(bCenter);
                const boxEdges = new THREE.EdgesGeometry(new THREE.BoxGeometry(bSize.x, bSize.y, bSize.z));
                const boxLine = new THREE.LineSegments(boxEdges,
                    new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.35 })
                );
                boxLine.position.copy(bCenter);
                model.add(boxLine);

                // Build heading arrow
                const arrowLen = 1.2;
                const shaft = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.025, 0.025, arrowLen, 8),
                    new THREE.MeshBasicMaterial({ color: 0x3b82f6 })
                );
                shaft.rotation.x = Math.PI / 2;
                shaft.position.z = arrowLen / 2;
                arrowGroup.add(shaft);

                const cone = new THREE.Mesh(
                    new THREE.ConeGeometry(0.07, 0.2, 8),
                    new THREE.MeshBasicMaterial({ color: 0x3b82f6 })
                );
                cone.rotation.x = Math.PI / 2;
                cone.position.z = arrowLen + 0.08;
                arrowGroup.add(cone);

                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.06, 12, 12),
                    new THREE.MeshBasicMaterial({ color: 0x60a5fa })
                );
                arrowGroup.add(dot);

                // Position arrow at model center height
                box.setFromObject(model);
                const mc = new THREE.Vector3();
                box.getCenter(mc);
                arrowGroup.position.set(0, mc.y, 0);
            });

            const entry = { container, renderer, scene, camera, modelGroup, boat, card, plateMat, controls, arrowGroup, loadedModel: () => loadedModel };

            // Click anywhere on card to expand
            card.addEventListener('click', (e) => {
                if (e.target.closest('.back-btn')) return;
                if (expandedEntry === entry) return; // already expanded
                expandCard(entry);
            });

            // Back button
            card.querySelector('.back-btn').addEventListener('click', (e) => {
                e.stopPropagation();
                collapseCard();
            });

            cardEntries.push(entry);
        }

        // ── Expand / Collapse ──
        function expandCard(entry) {
            expandedEntry = entry;

            // Fade out other cards and column headers
            cardEntries.forEach(e => {
                if (e !== entry) e.card.classList.add('faded');
            });
            colHeaders.classList.add('headers-hidden');

            // Expand the selected card
            entry.card.classList.add('expanded');
            backdrop.classList.add('active');

            // Enable orbit controls
            entry.controls.enabled = true;

            // Show heading arrow
            entry.arrowGroup.visible = true;

            // Resize renderer after transition
            setTimeout(() => {
                resizeEntry(entry);
            }, 50);
            // Resize again after CSS transition completes
            setTimeout(() => {
                resizeEntry(entry);
            }, 550);
        }

        function collapseCard() {
            if (!expandedEntry) return;

            // Hide heading arrow
            expandedEntry.arrowGroup.visible = false;

            // Disable orbit controls, reset camera
            expandedEntry.controls.enabled = false;
            expandedEntry.camera.position.set(1.8, 1.0, 2.2);
            expandedEntry.camera.lookAt(0, 0.15, 0);
            expandedEntry.controls.target.set(0, 0.3, 0);
            expandedEntry.controls.update();

            // Collapse card
            expandedEntry.card.classList.remove('expanded');
            backdrop.classList.remove('active');

            // Unfade all cards
            cardEntries.forEach(e => e.card.classList.remove('faded'));
            colHeaders.classList.remove('headers-hidden');

            // Resize back after transition
            const entry = expandedEntry;
            expandedEntry = null;
            setTimeout(() => resizeEntry(entry), 550);
        }

        function resizeEntry(entry) {
            const w = entry.container.clientWidth;
            const h = entry.container.clientHeight;
            if (w > 0 && h > 0) {
                entry.camera.aspect = w / h;
                entry.camera.updateProjectionMatrix();
                entry.renderer.setSize(w, h);
            }
        }

        // Backdrop click to close
        backdrop.addEventListener('click', collapseCard);

        // Escape key to close
        window.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') collapseCard();
        });

        // ── Animation Loop ──
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const t = clock.getElapsedTime();

            cardEntries.forEach((e, i) => {
                // Spin (auto-rotate only when not expanded or when expanded and orbit is idle)
                if (e !== expandedEntry) {
                    e.modelGroup.rotation.y = t * 0.5;
                }

                // Wave bobbing
                e.modelGroup.position.y = Math.sin(t * 1.5 + i * 0.7) * 0.02;
                e.modelGroup.rotation.x = Math.sin(t * 1.2 + i * 0.5) * 0.015;
                e.modelGroup.rotation.z = Math.cos(t * 1.0 + i * 0.9) * 0.01;

                // Animate water
                if (e.plateMat.normalMap) {
                    e.plateMat.normalMap.offset.x = t * 0.02;
                    e.plateMat.normalMap.offset.y = t * 0.015;
                }

                // Update controls if expanded
                if (e === expandedEntry && e.controls.enabled) {
                    e.controls.update();
                    // Heading label
                    let deg = THREE.MathUtils.radToDeg(e.modelGroup.rotation.y) % 360;
                    if (deg < 0) deg += 360;
                    e.card.querySelector('.heading-label').textContent = Math.round(deg) + '°';
                }

                // Render if visible
                const r = e.container.getBoundingClientRect();
                if (r.bottom > 0 && r.top < window.innerHeight && r.width > 0) {
                    e.renderer.render(e.scene, e.camera);
                }
            });
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            cardEntries.forEach(e => resizeEntry(e));
        });
    </script>
</body>

</html>
